<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Catalog Search</title>

<style>
    body {
        background: #f4f6f9;
        font-family: Arial,Helvetica,sans-serif;
    }

    .card {
        border: none;
        border-radius: 15px;
    }

    h2 {
        font-weight: bold;
        color: #0d6efd;
    }

    /* ===========================
   Search
=========================== */

    .search-wrapper {
        position: relative;
    }

    #search {
        height: 55px;
        font-size: 18px;
        border-radius: 10px 0 0 10px;
    }

    #btnSearch {
        width: 130px;
        font-size: 18px;
        border-radius: 0 10px 10px 0;
    }

    /* ===========================
   Suggestions
=========================== */

    #suggestions {
        position: absolute;
        top: 60px;
        width: 100%;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;
        box-shadow: 0 5px 15px rgba(0,0,0,.15);
        max-height: 350px;
        overflow-y: auto;
        display: none;
        z-index: 999;
    }

    .suggestion {
        padding: 12px 15px;
        cursor: pointer;
        transition: .2s;
        border-bottom: 1px solid #eee;
    }

        .suggestion:last-child {
            border-bottom: none;
        }

        .suggestion:hover {
            background: #0d6efd;
            color: white;
        }

    /* ===========================
   PDF Modal
=========================== */

    .modal-content {
        border-radius: 12px;
        overflow: hidden;
    }

    .modal-header {
        background: #0d6efd;
        color: white;
    }

    .modal-title {
        font-weight: bold;
    }

    .btn-close {
        filter: invert(1);
    }

    #pdfViewer {
        width: 100%;
        height: 85vh;
        border: none;
    }

    /* ===========================
   Scrollbar
=========================== */

    #suggestions::-webkit-scrollbar {
        width: 8px;
    }

    #suggestions::-webkit-scrollbar-thumb {
        background: #0d6efd;
        border-radius: 10px;
    }

    #suggestions::-webkit-scrollbar-track {
        background: #f1f1f1;
    }

    /* ===========================
   Mobile
=========================== */

    @media(max-width:768px) {

        #btnSearch {
            width: 100px;
            font-size: 16px;
        }

        #search {
            font-size: 16px;
        }

        #pdfViewer {
            height: 70vh;
        }
    }
</style>
       
       
       
       <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

        <div class="container py-5">

            <div class="row justify-content-center">

                <div class="col-lg-8">

                    <div class="card shadow">

                        <div class="card-body">

                            <h2 class="text-center mb-4">
                                Product Catalog Search
                            </h2>

                            <div class="search-wrapper">

                                <div class="input-group">

                                    <input type="text"
                                           id="search"
                                           class="form-control form-control-lg"
                                           placeholder="Search Product...">

                                    <button class="btn btn-primary"
                                            id="btnSearch">

                                        Search

                                    </button>

                                </div>

                                <div id="suggestions"></div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>


        <!-- PDF Modal -->

        <div class="modal fade"
             id="pdfModal"
             tabindex="-1">

            <div class="modal-dialog modal-xl modal-dialog-centered">

                <div class="modal-content">

                    <div class="modal-header">

                        <h5 class="modal-title"
                            id="modalTitle">

                            Product Catalog

                        </h5>

                        <button class="btn-close"
                                data-bs-dismiss="modal">
                        </button>

                    </div>

                    <div class="modal-body p-0">

                        <iframe id="pdfViewer">
                        </iframe>

                    </div>

                </div>

            </div>

        </div>


        <!--redirect to pdf and open the page number of the product in pdf file.-->
        <script>
            // ==============================
            // Product List
            // ==============================

            const products = [

                
                { name: "Wall Putty", page: 8 },
                { name: "ADAPTERS - EXPANSION", page: 2 },
                { name: "ADAPTERS - REDUCERS", page: 2 },
                { name: "ADAPTERS - TWO WAY PARALLEL", page: 3 },
                { name: "ADAPTER - CONE TO RUBBER TUBING", page: 3 },
                { name: "ADAPTER - CONE WITH GLASS STOPCOCK", page: 4 },
                { name: "ADAPTER - VACUUM RELEASE STOPCOCK (ONE WAY)", page: 4 },
                { name: "ADAPTER - VACUUM RELEASE & CONTROL STOPCOCK", page: 4 },
                { name: "ADAPTER - RECOVERY PLAIN BEND SLOPPING", page: 5 },
                { name: "ADAPTER - RECOVERY STILL HEAD", page: 5 },
                { name: "ADAPTER - RECOVERY CLAISENHEAD SLOPPING", page: 6 },
                { name: "THERMOMETER POCKET (SHORT) FOR STILL HEAD/CLAISENHEAD", page: 6 },

                { name: "ADAPTER - RECOVERY SPLASH HEAD SLOPPING", page: 7 },
                { name: "ADAPTER - RECOVERY SPLASH HEAD VERTICAL", page: 7 },

                { name: "ADAPTER - RECEIVER PLAIN BEND SHORT/LONG ", page: 8},
                { name: "ADAPTER - RECEIVER BEND WITH VACUUM CONNECTION", page: 8 },
                { name: "ADAPTER - RECEIVER BEND WITH MULTIPLE CONNECTION (PIG) ", page: 8 },

                { name: "ADAPTER - RECEIVER MULTI-LIMB WITH VACUUM CONNECTION ", page: 9 },
                {
                    name: "RECEIVER ADAPTER FOR MULTI-LIMB SLOPPING DELIVERY"
                    , page: 9
                },
                {
                    name: "ADAPTER - INTERMEDIATE RECIVER PERKIN"
                    , page: 9
                },
                { name: "BEAKERS", page: 13 },
                { name: "BOTTLES", page: 14 },
                
                { name: "BURETTES", page: 20 },
                { name: "SEAL TUBES", page: 23 },
                { name: "COLUMNS", page: 24 },
                {
                    name: "CHROMATIGRAPHY", page: 38 },
                { name: "CONDENSERS", page: 40 },
                { name: "CYLINDERS", page: 45 },
                { name: "DISHES", page: 49 },
                { name: "DEAN & STARK RECEIVERS", page: 50 },
                { name: "RECEIVERS - CLEVENGER", page: 52 },
                { name: "EXTRACTORS", page: 53 },
                { name: "FLASKS", page: 53 },
                { name: "FUNNELS", page: 72 },
                { name: "JACKETED REACTORS", page: 79 },
                { name: "PIPETTES", page: 79 },
                { name: "STIRRERS", page: 85 },
                { name: "STOPERS", page: 85 },
                { name: "SINTERED GLASSWARE", page: 85 },
                { name: "TEST TUBES", page: 92 },
                { name: "TUBES", page: 94 },
                { name: "VACUUME GAUGES", page: 96 },
                { name: "STANDARD APPARATUS", page: 97 },
                //{ name: "xyz", page: 52 }
                //{ name: "Socket, 16A", page: 32 },
                //{ name: 'PVC Pipe (3")', page: 5 },

            ];

            // ==============================
            // Controls
            // ==============================

            const txtSearch = document.getElementById("search");
            const btnSearch = document.getElementById("btnSearch");
            const suggestionBox = document.getElementById("suggestions");

            let pdfModal = new bootstrap.Modal(document.getElementById("pdfModal"));


            // ==============================
            // Normalize Text
            // Ignore Case
            // Ignore Quotes
            // Ignore Brackets
            // Ignore Comma
            // ==============================

            function normalize(text) {

                return text
                    .toLowerCase()
                    // Replace separators with spaces
                    .replace(/[-_/\\]/g, " ")
                    // Remove brackets, quotes, commas, dots, etc.
                    .replace(/[()[\]{}"'`,.;:]/g, "")
                    // Remove multiple spaces
                    .replace(/\s+/g, " ")
                    .trim();
            }


            // ==============================
            // Show Suggestions
            // ==============================

            function showSuggestions() {

                let keyword = normalize(txtSearch.value);

                suggestionBox.innerHTML = "";

                if (keyword === "") {

                    suggestionBox.style.display = "none";

                    return;

                }

                let result = products.filter(function (product) {

                    return normalize(product.name).includes(keyword);

                });

                if (result.length === 0) {

                    suggestionBox.style.display = "none";

                    return;

                }

                suggestionBox.style.display = "block";

                result.forEach(function (product) {

                    let div = document.createElement("div");

                    div.className = "suggestion";

                    div.innerHTML = product.name;

                    div.onclick = function () {

                        txtSearch.value = product.name;

                        suggestionBox.style.display = "none";

                        openPDF(product);

                    };

                    suggestionBox.appendChild(div);

                });

            }



            // ==============================
            // Search
            // ==============================

            function searchProduct() {

                let keyword = normalize(txtSearch.value);

                if (keyword === "")
                    return;

                let result = products.find(function (product) {

                    return normalize(product.name).includes(keyword);

                });

                if (result) {

                    openPDF(result);

                }
                else {

                    alert("Product Not Found");

                }

            }



            // ==============================
            // Open PDF
            // ==============================

            function openPDF(product) {

                document.getElementById("modalTitle").innerHTML = product.name;

                document.getElementById("pdfViewer").src =
                    "catalog.pdf#page=" + product.page;

                pdfModal.show();

            }



            // ==============================
            // Close PDF
            // ==============================

            document.getElementById("pdfModal").addEventListener("hidden.bs.modal", function () {

                document.getElementById("pdfViewer").src = "";

            });



            // ==============================
            // Events
            // ==============================

            txtSearch.addEventListener("input", function () {

                showSuggestions();

            });



            btnSearch.addEventListener("click", function () {

                searchProduct();

            });



            txtSearch.addEventListener("keydown", function (e) {

                if (e.key === "Enter") {

                    e.preventDefault();

                    searchProduct();

                }

            });



            // Hide suggestions when clicking outside

            document.addEventListener("click", function (e) {

                if (!e.target.closest(".search-wrapper")) {

                    suggestionBox.style.display = "none";

                }

            });
        </script>

    </body>
</html>
