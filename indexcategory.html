    <!-- JavaScript -->


    <script>


        // ===============================
        // Alive Group Product Search
        // ===============================
        let products = [];
        let excelData = [];
        async function loadProducts() {
            const res = await fetch("data/products.json");
            const data = await res.json();
            excelData = data;

            products = data.map(item => ({ name: item.category }));
            console.log(products.length);
        }
        loadProducts();

        const input = document.getElementById("searchInput");
        const button = document.getElementById("searchBtn");
        const suggestions = document.getElementById("suggestions");

        // ===============================
        // Live Search
        // ===============================

        function showSuggestions(keyword) {
            document.getElementById("productDetails").style.display = "none"
            suggestions.innerHTML = "";

            if (keyword.length === 0) {
                suggestions.style.display = "none";
                return;
            }

            const result = products.filter(product =>
                product.name.toLowerCase().includes(keyword.toLowerCase())
            );

            if (result.length === 0) {

                suggestions.style.display = "none";
                return;

            }

            suggestions.style.display = "block";

            result.forEach(product => {

                const div = document.createElement("div");
                div.setAttribute("class", "suggestion-item")
                div.innerHTML = product.name;
                //on click of suggestion show its sub category
                div.onclick = function () {

                    input.value = product.name;
                    if (input.value)
                        input.value = input.value.trim().toLowerCase()

                    suggestions.style.display = "none";

                };

                suggestions.appendChild(div);

            });

        }

        // ===============================
        // show product on suggestion dropbox click
        // ===============================
        const items = document.querySelectorAll("div.suggestion-item");

        items.forEach(link => {
            items.addEventListener("click", function () {

                console.log(this);
            });

        });


        // ===============================
        // Search Input
        // ===============================

        input.addEventListener("keyup", function () {

            showSuggestions(this.value);

        });

        // ===============================
        // Search Button
        // ===============================

        button.addEventListener("click", function () {
            // searchProduct();
            showProduct(input.value)
        });

        // ===============================
        // Enter Key
        // ===============================

        input.addEventListener("keypress", function (e) {

            if (e.key === "Enter") {

                searchProduct();

            }

        });

        // ===============================
        // Search Product
        // ===============================

        function searchProduct() {

            let keyword = input.value.trim().toLowerCase();

            if (keyword === "") {

                alert("Please enter product name.");

                return;

            }

            const product = products.find(p =>
                p.name.toLowerCase() === keyword
            );

            if (!product) {

                alert("Product not found.");
                return;

            }

            showProduct(product.name);

        }


        function showProduct(name) {
            const mainProduct = excelData.find(p =>
                p.category.toLowerCase() === name.toLowerCase()
            );


            if (!mainProduct) {
                //document.getElementById("productDetails").innerHTML =
                //    "<h3>Product not found.</h3>";
                //return;
                alert('Enter the Product Name.')
            }

            let rows = "";

            mainProduct.subProducts.forEach(item => {

                rows += `
                                            <tr>
                                                <td>${item.catNo}</td>
                                                <td>${item.description}</td>
                                                <td>${item.rate}/-</td>
                                                <td>
                                                <button class="btn btn-primary"
                                onclick='addToEstimation(${JSON.stringify(item)})'>
                                Add
                            </button>
                                            </tr>
                                        `;

            });

            //if image exist then add
            const layoutClass = mainProduct.image ? "product-layout" : "product-layout no-image";
            const imageHtml = mainProduct.image
                ? `
                                          <div class="product-image">
                                            <img src="images/products/${mainProduct.image}" alt="#"
                                                class="img-fluid rounded shadow" style="max-height:400px; object-fit:contain;">
                                          </div>
                          `
                : "";

            document.getElementById("productDetails").innerHTML = `
                                            <div  class="${layoutClass}">
                                                <div class="product-table">
                                                    <h2 class="mb-4">${mainProduct.category}</h2>
                                                    <!-- Table -->
                                                        <div class="table-responsive">
                                                                 <table class="table table-bordered table-striped">
                                                                    <thead class="table-dark">
                                                                        <tr>
                                                                            <th>Cat. No.</th>
                                                                            <th>Description</th>
                                                                            <th>Rate</th>
                                                                            <th>Add to Estimation</th>
                                                                        </tr>
                                                                    </thead>
                                                                    <tbody>
                                                                             ${rows}
                                                                    </tbody>
                                                                </table>
                                                        </div>
                                               </div>

                                                     <!-- Image -->
                                           ${imageHtml}
                                    </div>
                                    `;
            document.getElementById("productDetails").style.display = "block"
        }

        // ===============================
        // Hide Suggestions
        // ===============================

        document.addEventListener("click", function (e) {
            if (!e.target.closest(".search-box")) {
                suggestions.style.display = "none";
            }
        });

        // ===============================
        // Scroll To Top
        // ===============================

        const topBtn = document.getElementById("topBtn");

        window.addEventListener("scroll", function () {

            if (window.pageYOffset > 300) {

                topBtn.style.display = "block";

            } else {

                topBtn.style.display = "none";

            }

        });

        topBtn.addEventListener("click", function () {

            window.scrollTo({

                top: 0,

                behavior: "smooth"

            });

        });

        // ===============================
        // Navbar Active Link
        // ===============================

        const links = document.querySelectorAll("nav a");

        links.forEach(link => {

            link.addEventListener("click", function () {

                links.forEach(l => l.classList.remove("active"));

                this.classList.add("active");

            });

        });

        // ===============================
        // Header Shadow
        // ===============================

        window.addEventListener("scroll", function () {

            const header = document.querySelector("header");

            if (window.scrollY > 20) {

                header.style.boxShadow = "0 5px 20px rgba(0,0,0,.15)";

            } else {

                header.style.boxShadow = "0 3px 10px rgba(0,0,0,.08)";

            }

        });

        // ===============================
        // Image Fade Animation
        // ===============================

        const observer = new IntersectionObserver(entries => {

            entries.forEach(entry => {

                if (entry.isIntersecting) {

                    entry.target.classList.add("show");

                }

            });

        });

        document.querySelectorAll(".card,.about-image,.contact-card").forEach(el => {

            observer.observe(el);

        });

        // ===============================
        // Loading Complete
        // ===============================

        window.onload = function () {

            console.log("Alive Group Website Loaded Successfully.");

        };
    </script>

    <!--//add to estimation-->
    <script>
        let estimationCart =
            JSON.parse(localStorage.getItem("estimationCart")) || [];

        updateCartCount();

        function addToEstimation(item) {

            // Find if product already exists
            const existing = estimationCart.find(x => x.catNo === item.catNo);

            if (existing) {

                // Increase quantity
                existing.qty += 1;

            } else {

                // Add new product
                estimationCart.push({

                    catNo: item.catNo,
                    description: item.description,
                    unit: item.unit || "NOS",
                    qty: 1,
                    rate: Number(item.rate),
                    gst: Number(item.gst || 18)

                });

            }

            // Save to Local Storage
            localStorage.setItem(
                "estimationCart",
                JSON.stringify(estimationCart)
            );

            // Update Estimation Count
            updateCartCount();

            // Optional Success Message
            alert("Product added to estimation.");

            // Refresh popup if already open
            //if (document.getElementById("estimationPopup").style.display === "block") {
            //    showEstimation();
            //}
        }



        function updateCartCount() {

            const count = estimationCart.reduce((total, item) => {
                return total + Number(item.qty);
            }, 0);

            document.getElementById("cartCount").innerText = count;

            // Optional: Disable View Estimation button if empty
            const btn = document.getElementById("btnViewEstimation");
            if (btn) {
                btn.disabled = (count === 0);
            }

        }
        function showEstimation() {

            if (estimationCart.length === 0) {
                document.getElementById("estimationTable").innerHTML =
                    "<h4 class='text-center'>No products added.</h4>";

                document.getElementById("estimationPopup").style.display = "block";
                return;
            }

            let totalQty = 0;
            let subTotal = 0;
            let totalGST = 0;
            let grandTotal = 0;

            let html = `
                    <div class="table-responsive">

                    <table class="table table-bordered invoice-table">

                        <thead class="table-dark">

                            <tr>
                                <th>Sr.</th>
                                <th>Description</th>
                                <th>Cat. No.</th>
                                <th>Qty</th>
                                <!--<th>Unit</th>-->
                                <th>Rate</th>
                                <th>Amount</th>
                                <th>GST %</th>
                                <th>GST Amt</th>
                                <th>Total</th>
                                <th>Action</th>
                            </tr>

                        </thead>

                        <tbody>
                    `;

            estimationCart.forEach((item, index) => {

                const qty = Number(item.qty);
                const rate = Number(item.rate);
                const gst = Number(item.gst || 18);

                const amount = qty * rate;
                const gstAmount = amount * gst / 100;
                const finalAmount = amount + gstAmount;

                totalQty += qty;
                subTotal += amount;
                totalGST += gstAmount;
                grandTotal += finalAmount;

                html += `
                        <tr>

                            <td>${index + 1}</td>

                            <td>${item.description}</td>

                            <td>${item.catNo}</td>

                            <td style="width:90px">

                                <input
                                    type="number"
                                    min="1"
                                    value="${qty}"
                                    class="form-control text-center"
                                    onchange="updateQty(${index},this.value)">

                            </td>

                            <!--<td>NOS</td>-->

                            <td class="text-end">
                                ₹${rate.toFixed(2)}
                            </td>

                            <td class="text-end">
                                ₹${amount.toFixed(2)}
                            </td>

                            <td class="text-center">
                                ${gst}
                            </td>

                            <td class="text-end">
                                ₹${gstAmount.toFixed(2)}
                            </td>

                            <td class="text-end fw-bold">
                                ₹${finalAmount.toFixed(2)}
                            </td>

                            <td class="text-center">

                                <button
                                    class="btn btn-danger btn-sm"
                                    onclick="removeItem(${index})">

                                    <i class="bi bi-trash"></i>

                                </button>

                            </td>

                        </tr>
                        `;
            });

            const roundedTotal = Math.round(grandTotal);
            const roundOff = (roundedTotal - grandTotal).toFixed(2);

            html += `

                        </tbody>

                        <tfoot>

                            <tr class="table-secondary">

                                <th colspan="3" class="text-center">
                                    TOTAL
                                </th>

                                <th>${totalQty}</th>
                                <!--<th></th>-->


                                <th></th>

                                <th class="text-end">
                                    ₹${subTotal.toFixed(2)}
                                </th>

                                <th></th>

                                <th class="text-end">
                                    ₹${totalGST.toFixed(2)}
                                </th>

                                <th class="text-end">
                                    ₹${grandTotal.toFixed(2)}
                                </th>

                                <th></th>

                            </tr>

                            <tr>

                                <td colspan="9"
                                    class="text-end fw-bold">

                                    Round Off

                                </td>

                                <td class="text-end">
                                    ₹${roundOff}
                                </td>


                            </tr>

                            <tr>

                                <td colspan="9"
                                    class="fw-bold">

                                    Total Invoice Value (In Figure)

                                </td>

                                <td class="text-end fw-bold">
                                    ₹${roundedTotal.toFixed(2)}
                                </td>


                            </tr>
                             <tr>

                     <td colspan="5" class="fw-bold">
                         <b>Total Invoice Value (In Words)</b>
                     </td>

                     <td colspan="5" class="text-end fw-bold">
                        ${numberToWords(roundedTotal).toUpperCase()} ONLY
                     </td>
                 </tr>


                        </tfoot>
                    </table>
                    </div>

                    <div class="text-end mt-3">
                        <button
                            class="btn btn-success"
                            onclick="sendEstimationEmail()">

                            Send Estimation

                        </button>

                      <!--  <button class="btn btn-primary" onclick="printEstimation()">Print</button>-->

                        <button
                            class="btn btn-danger ms-2"
                            onclick="clearEstimation()">

                            Clear All

                        </button>

                    </div>
                    `;

            document.getElementById("estimationTable").innerHTML = html;
            document.getElementById("estimationPopup").style.display = "block";
        }

        function updateQty(index, qty) {

            qty = parseInt(qty);

            if (isNaN(qty) || qty < 1) {
                qty = 1;
            }

            // Update quantity
            estimationCart[index].qty = qty;

            // Save to local storage
            localStorage.setItem(
                "estimationCart",
                JSON.stringify(estimationCart)
            );

            // Refresh estimation
            showEstimation();

            // Update cart count
            updateCartCount();
        }

        function removeItem(index) {

            if (!confirm("Remove this product from estimation?")) {
                return;
            }

            // Remove selected item
            estimationCart.splice(index, 1);

            // Save updated cart
            localStorage.setItem(
                "estimationCart",
                JSON.stringify(estimationCart)
            );

            // Update estimation count
            updateCartCount();

            // Refresh popup
            if (estimationCart.length > 0) {
                showEstimation();
            } else {

                document.getElementById("estimationTable").innerHTML =
                    `<div class="text-center p-4">
                                <h4>No products added.</h4>
                            </div>`;

                document.getElementById("estimationPopup").style.display = "block";
            }
        }
        function clearEstimation() {

            if (!confirm("Are you sure you want to clear the estimation?")) {
                return;
            }

            // Clear array
            estimationCart = [];

            // Remove from local storage
            localStorage.removeItem("estimationCart");

            // Update count
            updateCartCount();

            // Update popup
            document.getElementById("estimationTable").innerHTML =
                `<div class="text-center p-4">
                            <h4>No products added.</h4>
                        </div>`;

            document.getElementById("estimationPopup").style.display = "none";
        }
        function closeEstimation() {

            document.getElementById("estimationPopup").style.display = "none";

        }



        function sendEstimationEmail() {

            if (estimationCart.length === 0) {
                alert("No products in estimation.");
                return;
            }

            let subTotal = 0;
            let totalGST = 0;
            let grandTotal = 0;
            let totalQty = 0;

            let body = "";

            body += "Hello ALIVE GROUP,\n\n";
            body += "Please send Product Estimation\n";
            body += "====================================================\n\n";

            //body += "Sr | Cat No \n Qty \n Rate \n Amount \n GST \n Total\n";
            //body += "Sr | Cat No | Qty | Rate | Amount | GST | Total\n";
            //body += "----------------------------------------------------\n";

            estimationCart.forEach((item, index) => {

                const qty = Number(item.qty);
                const rate = Number(item.rate);
                const gst = Number(item.gst || 18);

                const amount = qty * rate;
                const gstAmount = amount * gst / 100;
                const finalAmount = amount + gstAmount;

                totalQty += qty;
                subTotal += amount;
                totalGST += gstAmount;
                grandTotal += finalAmount;

                body +=
                    "Sr." + (index + 1) + " " + item.description
                    + "\n Cat No: " + item.catNo
                    + "\n Qty: " + qty
                    + "\n rate: " + rate.toFixed(2)
                    + "\n amount:  " + amount.toFixed(2) +
                    +"\n gstAmount: " + gstAmount.toFixed(2)
                    + "\n finalAmount: " + finalAmount.toFixed(2) + "\n";

                body += "----------------------------------------------------\n";

            });

            const roundOff = Math.round(grandTotal) - grandTotal;
            const invoiceValue = Math.round(grandTotal);

            body += "\n";
            body += "Total Qty      : " + totalQty + "\n";
            body += "Sub Total      : ₹" + subTotal.toFixed(2) + "\n";
            body += "GST Total      : ₹" + totalGST.toFixed(2) + "\n";
            body += "Round Off      : ₹" + roundOff.toFixed(2) + "\n";
            body += "Grand Total    : ₹" + invoiceValue.toFixed(2) + "\n\n";

            body += "Amount In Words\n";
            body += numberToWords(invoiceValue).toUpperCase() + " ONLY\n\n";

            body += "Thank you.\n";
            body += "Alive Group";

            const subject = "Product Estimation";

            const mailtoLink =
                "mailto:alivesolution@gmail.com"
                + "?subject=" + encodeURIComponent(subject)
                + "&body=" + encodeURIComponent(body);

            window.open(mailtoLink);
        }

        function numberToWords(num) {

            if (num === 0) return "Zero";

            const ones = [
                "", "One", "Two", "Three", "Four", "Five",
                "Six", "Seven", "Eight", "Nine", "Ten",
                "Eleven", "Twelve", "Thirteen", "Fourteen",
                "Fifteen", "Sixteen", "Seventeen",
                "Eighteen", "Nineteen"
            ];

            const tens = [
                "", "", "Twenty", "Thirty", "Forty",
                "Fifty", "Sixty", "Seventy",
                "Eighty", "Ninety"
            ];

            function convertHundreds(n) {

                let str = "";

                if (n > 99) {
                    str += ones[Math.floor(n / 100)] + " Hundred ";
                    n %= 100;
                }

                if (n > 19) {
                    str += tens[Math.floor(n / 10)] + " ";
                    n %= 10;
                }

                if (n > 0) {
                    str += ones[n] + " ";
                }

                return str.trim();
            }

            let result = "";

            if (num >= 10000000) {
                result += convertHundreds(Math.floor(num / 10000000)) + " Crore ";
                num %= 10000000;
            }

            if (num >= 100000) {
                result += convertHundreds(Math.floor(num / 100000)) + " Lakh ";
                num %= 100000;
            }

            if (num >= 1000) {
                result += convertHundreds(Math.floor(num / 1000)) + " Thousand ";
                num %= 1000;
            }

            if (num > 0) {
                result += convertHundreds(num);
            }

            return result.trim();
        }

            const win = window.open("", "", "width=1000,height=700");

            win.document.write(`
            <html>
            <head>
                <title>Estimation</title>

                <link rel="stylesheet"
                      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

                <style>
                    body {
                        padding: 20px;
                        font-family: Arial;
                    }

                    .btn {
                        display: none;
                    }

                    input {
                        border: none;
                        text-align: center;
                        width: 60px;
                    }

                    .invoice-table th:last-child,
                    .invoice-table td:last-child {
                        display: none;
                    }
                </style>

            </head>

            <body>

                <h2>Alive Group</h2>

                ${printContents}

            </body>
</html>
            `);

            win.document.close();
            win.focus();

            setTimeout(() => {
                win.print();
                win.close();
            }, 500);

        }
    </script>
