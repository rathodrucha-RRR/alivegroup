<html lang="en">

<head>

    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <!-- ================= HEADER ================= -->

    <header>

        <div class="container">

            <div class="bannerlogo">
                <img src="images/logo2.png" alt="Alive Group" />
            </div>
            <div class="menu-toggle" id="menuToggle">
                ☰
            </div>
            <nav id="navbar">

                <ul>

                    <li><a href="/">Home</a></li>

                    <li><a href="/#about">About</a></li>

                    <li><a href="/#features">Why Us</a></li>

                    <li><a href="/#search">Products</a></li>

                    <li><a href="/#contact">Contact</a></li>

                </ul>

            </nav>

        </div>

    </header>
    <!-- ================= PRODUCT-SEARCH ================= -->
    <section id="search" class="product-search">

        <div class="container">


            <p class="subtitle">
                Search for any laboratory product from the catalog.
            </p>

            <div class="search-box">

                <input type="text"
                       id="searchInput"
                       placeholder="Search Product Name..."
                       autocomplete="off">
                <div id="suggestions" class="suggestion-box"></div>

                <button id="searchBtn"> Search </button>

            </div>
        </div>

            <input type="text"
                   id="searchInput"
                   class="form-control"

            <div id="suggestions" class="suggestion-box"></div>

        </div>

        <button id="searchBtn" class="btn btn-primary">
            Search
        </button>

        <div id="productDetails"></div>-->

    </section>
    <section>
        <div id="productDetails"></div>

    </section>
    <!-- ================= PRODUCT-SHOW ================= -->

        <div class="row">

            <div class="col-lg-6 col-md-6 col-12">
                Left Content

    <!-- Scroll To Top -->

    <button id="topBtn">

        ↑

    <!-- JavaScript -->


    <script src="js/script.js"></script>
    <script>
        // ===============================
        // Alive Group Product Search
        // ===============================
        let products = [];
        let excelData = [];
        async function loadProducts() {
            const res = await fetch("data/products.json");
            const data = await res.json();
            excelData = data;

            products = data.map(item => ({ name: item.category }));
            console.log(products.length);
        }
        loadProducts();

        const input = document.getElementById("searchInput");
        const button = document.getElementById("searchBtn");
        const suggestions = document.getElementById("suggestions");

        // ===============================
        // Live Search
        // ===============================

        function showSuggestions(keyword) {
            document.getElementById("productDetails").style.display = "none"
            suggestions.innerHTML = "";

            if (keyword.length === 0) {
                suggestions.style.display = "none";
                return;
            }

            const result = products.filter(product =>
                product.name.toLowerCase().includes(keyword.toLowerCase())
            );

            if (result.length === 0) {

                suggestions.style.display = "none";
                return;

            }

            suggestions.style.display = "block";

            result.forEach(product => {

                const div = document.createElement("div");
                div.setAttribute("class", "suggestion-item")
                div.innerHTML = product.name;
                //on click of suggestion show its sub category
                div.onclick = function () {

                    input.value = product.name;
                    if (input.value)
                        input.value = input.value.trim().toLowerCase()

                    suggestions.style.display = "none";

                };

                suggestions.appendChild(div);

            });

        }

        // ===============================
        // show product on suggestion dropbox click
        // ===============================
        const items = document.querySelectorAll("div.suggestion-item");

        items.forEach(link => {
            items.addEventListener("click", function () {

                console.log(this);
            });

        });


        // ===============================
        // Search Input
        // ===============================

        input.addEventListener("keyup", function () {

            showSuggestions(this.value);

        });

        // ===============================
        // Search Button
        // ===============================

        button.addEventListener("click", function () {
            debugger
            // searchProduct();
            showProduct(input.value)
        });

        // ===============================
        // Enter Key
        // ===============================

        input.addEventListener("keypress", function (e) {

            if (e.key === "Enter") {

                searchProduct();

            }

        });

        // ===============================
        // Search Product
        // ===============================

        function searchProduct() {

            let keyword = input.value.trim().toLowerCase();

            if (keyword === "") {

                alert("Please enter product name.");

                return;

            }

            const product = products.find(p =>
                p.name.toLowerCase() === keyword
            );

            if (!product) {

                alert("Product not found.");
                return;

            }

            showProduct(product.name);

        }


        function showProduct(name) {
            debugger

            const mainProduct = excelData.find(p =>
                p.category.toLowerCase() === name.toLowerCase()
            );


            if (!mainProduct) {
                document.getElementById("productDetails").innerHTML =
                    "<h3>Product not found.</h3>";
                return;
            }

            let rows = "";

            mainProduct.subProducts.forEach(item => {

                rows += `
                        <tr>
                            <td>${item.catNo}</td>
                            <td>${item.description}</td>
                            <td>${item.rate}/-</td>
                        </tr>
                    `;

            });

            //if image exist then add 
            const layoutClass  = mainProduct.image ? "product-layout" : "product-layout no-image";
            const imageHtml = mainProduct.image
                ? `
                      <div class="product-image">
                        <img src="images/products/${mainProduct.image}" alt="#" 
                            class="img-fluid rounded shadow" style="max-height:400px; object-fit:contain;">
                      </div>
      `
                : "";

            document.getElementById("productDetails").innerHTML = `
                        <div  class="${layoutClass}">
                            <div class="product-table">
                                <h2 class="mb-4">${mainProduct.category}</h2>
                                <!-- Table -->
                                    <div class="table-responsive">
                                             <table class="table table-bordered table-striped">
                                                <thead class="table-dark">
                                                    <tr>
                                                        <th>Cat. No.</th>
                                                        <th>Description</th>
                                                        <th>Rate</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                         ${rows}
                                                </tbody>
                                            </table>
                                    </div>
                           </div>

                                 <!-- Image -->
                       ${imageHtml}
                </div>
                `;
            document.getElementById("productDetails").style.display = "block"
        }

        // ===============================
        // Hide Suggestions
        // ===============================

        document.addEventListener("click", function (e) {
            if (!e.target.closest(".search-box")) {
                suggestions.style.display = "none";
            }
        });

        // ===============================
        // Scroll To Top
        // ===============================

        const topBtn = document.getElementById("topBtn");

        window.addEventListener("scroll", function () {

            if (window.pageYOffset > 300) {

                topBtn.style.display = "block";

            } else {

                topBtn.style.display = "none";

            }

        });

        topBtn.addEventListener("click", function () {

            window.scrollTo({

                top: 0,

                behavior: "smooth"

            });

        });

        // ===============================
        // Navbar Active Link
        // ===============================

        const links = document.querySelectorAll("nav a");

        links.forEach(link => {

            link.addEventListener("click", function () {

                links.forEach(l => l.classList.remove("active"));

                this.classList.add("active");

            });

        });

        // ===============================
        // Header Shadow
        // ===============================

        window.addEventListener("scroll", function () {

            const header = document.querySelector("header");

            if (window.scrollY > 20) {

                header.style.boxShadow = "0 5px 20px rgba(0,0,0,.15)";

            } else {

                header.style.boxShadow = "0 3px 10px rgba(0,0,0,.08)";

            }

        });

        // ===============================
        // Image Fade Animation
        // ===============================

        const observer = new IntersectionObserver(entries => {

            entries.forEach(entry => {

                if (entry.isIntersecting) {

                    entry.target.classList.add("show");

                }

            });

        });

        document.querySelectorAll(".card,.about-image,.contact-card").forEach(el => {

            observer.observe(el);

        });

        // ===============================
        // Loading Complete
        // ===============================

        window.onload = function () {

            console.log("Alive Group Website Loaded Successfully.");

        };
    </script>

    <!--// Mobile Menu-->
    <script>

        const menuToggle = document.getElementById("menuToggle");
        const navbar = document.getElementById("navbar");

        menuToggle.onclick = function () {

            navbar.classList.toggle("active");

            if (navbar.classList.contains("active")) {

                menuToggle.innerHTML = "✕";

            } else {

                menuToggle.innerHTML = "☰";

            }

        };


        // Close menu after click

        document.querySelectorAll("#navbar a").forEach(link => {

            link.onclick = function () {

                navbar.classList.remove("active");

                menuToggle.innerHTML = "☰";

            };

        });
    </script>

    <!--searchCategory-->
    <script>
        function searchCategory(productName) {

            // Put the category into the search box
            document.getElementById("searchInput").value = productName;

            // Call the existing search function
            searchProduct();

        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
